# OpenMidnight backbone (for extraction and EVA). Path to repo and checkpoint.
backbone:
  type: "openmidnight"
  openmidnight_repo: "/admin/home/divyanshu/worktrial/OpenMidnight"
  checkpoint: "/data/divy/checkpoints/teacher_checkpoint_load.pt"
  checkpoint_key: null  # set to "teacher" if checkpoint has a wrapper key
  override_pos_embed: true
  img_size: [224, 224]
  patch_size: 14
  hidden_size: 1536
  num_register_tokens: 4
  in_channels: 3
  ffn_layer: "swiglufused"
  block_chunks: 0
  init_values: 1.0

# Extraction: patch list, output paths, sharding. Training: where to find sharded .npy
data:
  size: [224, 224]
  patch_size: 224
  batch_size: 512
  num_workers: 8
  sample_list_path: "/block/TCGA/sample_dataset_30.txt"
  embeddings_output_dir: "/data/divy/embeddings/om/train_full"
  embeddings_file: "embeddings_full_{shard}.npy"
  embeddings_metadata_file: "patches_full_{shard}.csv"
  embeddings_dtype: "float16"
  shard_list_dir: "/data/divy/embeddings/om/train/shards_full"
  use_embeddings: true
  embedding_memmap: true
  embeddings_dir: "/data/divy/embeddings/om/train_full"
  embeddings_glob: "embeddings_full_shard*-of-08.npy"
  # HSV tissue filter (extraction only): skip patches with low tissue ratio
  filter_tissue: true
  filter_min_ratio: 0.6
  filter_hsv_lower: [90, 8, 103]
  filter_hsv_upper: [180, 255, 255]

# SAE: overcomplete latent dim, top-k (or l1) sparsity
model:
  latent_dim: 98304
  sparsity_type: "topk"  # or "l1"
  topk: 64
  l1_weight: 0.00003

optim:
  lr: 0.0001
  weight_decay: 0.0001

trainer:
  max_epochs: 20
  precision: "16-mixed"
  devices: [0]

# Checkpoints and wandb. save_name/run_name can use {model.topk}, {optim.lr:.0e}, etc.
logger:
  save_dir: "/data/divy/checkpoints/sae_adapter_checkpoints"
  save_name: "RUN2_sae_adapter_om_embeddigs_FULL_topk{model.topk}_lr{optim.lr:.0e}_lat{model.latent_dim}-{epoch:02d}-{train_loss:.4f}"
  project: "openmidnight_sae_adapter"
  run_name: "RUN2_sae_adapter_om_embeddigs_FULL_topk{model.topk}_lr{optim.lr:.0e}_lat{model.latent_dim}"
